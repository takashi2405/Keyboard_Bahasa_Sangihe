<title>Keyboard Bahasa Sangihe</title>

<style>

body{
    font-family:"Noto Sans", Arial, sans-serif;
    padding:20px;
    background:#f0f2f5;
}

.container{
    max-width:950px;
    margin:0 auto;
    background:white;
    padding:20px;
    border-radius:8px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
}

h2{
    margin:0;
    font-size:22px;
    color:#333;
}

/* FONT SELECT */
.fontBox{
    display:flex;
    align-items:center;
    gap:10px;
    background:#f8f9fa;
    border:1px solid #ced4da;
    border-radius:10px;
    padding:6px 10px;
    font-size:14px;
}

.fontBox label{
    display:flex;
    align-items:center;
    gap:5px;
    cursor:pointer;
}

.fontBox input{
    accent-color:#228be6;
}
