<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sangihe Keyboard QR Codes</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            background-color: #f4f6f9;
            padding: 20px 15px; /* 💡 上下の余白を半分に縮小 */
            margin: 0;
        }
        h1 {
            color: #333;
            font-size: 20px; /* 💡 タイトルを少し小さくしてスペースを節約 */
            margin-top: 10px;
            margin-bottom: 10px; /* 💡 下の文との間隔調整のため少し縮小 */
        }
        /* 💡 タイトル下の説明文用のスタイル（文字サイズをカード内の見出しと統一） */
        .subtitle {
            font-weight: bold;
            font-size: 15px;
            color: #555;
            margin-top: 0;
            margin-bottom: 25px;
            padding: 0 10px;
        }
        /* 全体を囲むコンテナ */
        .wrapper {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px; /* 💡 ボックス同士の隙間を 30px → 15px に半減 */
            max-width: 900px;
            margin: 0 auto;
        }
        /* 各QRコードのカード風ボックス */
        .qr-card {
            background: white;
            padding: 15px; /* 💡 ボックス内の余白を狭くして縦を縮小 */
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            width: 220px; /* 💡 全体サイズを元の約80%（280px → 220px）に縮小 */
            box-sizing: border-box;
        }
        /* QRコード画像 */
        .qr-card img {
            width: 100%;
            height: auto;
            margin-bottom: 8px; /* 💡 画像下の隙間を縮小 */
        }
        /* バージョン名の見出し */
        .version-title {
            font-weight: bold;
            font-size: 15px; /* 💡 文字を少しだけシャープに */
            color: #444;
            margin: 5px 0;
        }
        /* リンクボタン */
        .qr-card a {
            display: block;
            background-color: #0066cc;
            color: white;
            text-decoration: none;
            padding: 8px; /* 💡 ボタンの縦幅を少しスリムに */
            border-radius: 6px;
            font-size: 12px; /* 💡 URL文字のサイズ調整 */
            font-weight: bold;
            word-break: break-all;
            margin-top: 5px;
            transition: background 0.2s;
        }
        .qr-card a:hover {
            background-color: #004da6;
        }
    </style>
</head>
<body>

<h1>Keyboard Virtual Bahasa Sangihe</h1>
<div class="subtitle">Papan ketik web untuk mengetik karakter khusus ortografi bahasa Sangihe</div>

<div class="wrapper">

    <div class="qr-card">
        <div class="version-title">Untuk HP & Tablet</div>
        <img src="qrcode-hp.png" alt="QR Code HP">
        <a href="https://tinyurl.com/kb-sangihe-hp" target="_blank">https://tinyurl.com/kb-sangihe-hp</a>
    </div>

    <div class="qr-card">
        <div class="version-title">Untuk PC</div>
        <img src="qrcode-pc.png" alt="QR Code PC">
        <a href="https://tinyurl.com/kb-sangihe-pc" target="_blank">https://tinyurl.com/kb-sangihe-pc</a>
    </div>

</div>

</body>
</html>
